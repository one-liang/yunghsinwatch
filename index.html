<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind HTML Template</title>
    <link rel="stylesheet" href="./assets/css/index.css" />
  </head>
  <body class="flex min-h-screen flex-col bg-zinc-950 text-white">
    <header
      class="site-header sticky top-0 z-10 flex items-center justify-between border-b border-white/10 bg-zinc-950/90 px-6 py-4 backdrop-blur"
    >
      <a
        class="site-header__brand flex items-center gap-3 text-sm font-semibold text-white"
        href="./index.html"
      >
        <img class="site-header__logo size-8" src="./assets/images/logo.svg" alt="Template logo" />
        <span>Tailwind HTML</span>
      </a>
      <nav class="site-header__nav flex gap-4 text-sm text-zinc-300">
        <a class="hover:text-white data-[active=true]:text-white" href="./index.html">Home</a>
        <a class="hover:text-white data-[active=true]:text-white" href="./about.html">About</a>
      </nav>
    </header>

    <main class="flex-1 px-6 py-16">
      <section class="mx-auto grid max-w-6xl gap-10 md:grid-cols-[1fr_420px] md:items-center">
        <div>
          <p class="mb-4 text-sm font-semibold tracking-wide text-cyan-300 uppercase">
            Static HTML Builder
          </p>
          <h1 class="max-w-3xl text-5xl leading-tight font-semibold md:text-7xl">
            Tailwind pages with Vue-like HTML components.
          </h1>
          <p class="mt-6 max-w-2xl text-lg leading-8 text-zinc-300">
            Build readable HTML, CSS, and JS files that can be opened directly from the dist folder.
          </p>
          <a
            class="mt-8 inline-flex rounded-md bg-cyan-300 px-5 py-3 text-sm font-semibold text-zinc-950"
            href="./about.html"
          >
            View about page
          </a>
        </div>
        <img
          class="w-full max-w-[420px] justify-self-center rounded-lg border border-white/20 bg-zinc-900 md:justify-self-end"
          src="./assets/images/hero.svg"
          alt="Abstract interface preview"
        />
      </section>
    </main>

    <footer class="border-t border-white/10 bg-zinc-950 px-6 py-8 text-sm text-zinc-300">
      <div
        class="mx-auto flex max-w-6xl flex-col gap-4 md:flex-row md:items-center md:justify-between"
      >
        <p class="font-semibold text-white">Tailwind HTML Template</p>
        <nav class="flex gap-4">
          <a class="hover:text-white" href="./index.html">Home</a>
          <a class="hover:text-white" href="./about.html">About</a>
        </nav>
      </div>
    </footer>

    <script src="./assets/js/index.js"></script>
  </body>
</html>
